<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>My Three.js Demo</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>var THREE = THREE || {};</script>
    <script src="../src/core/Vector2.js"></script>
    <script src="../src/core/Vector3.js"></script>
    <script src="../src/core/Vector4.js"></script>
    <script src="../src/core/Matrix4.js"></script>
    <script src="../src/core/Color.js"></script>
    <script src="../src/core/Vertex.js"></script>
    <script src="../src/core/Face3.js"></script>
    <script src="../src/core/Face4.js"></script>
    <script src="../src/core/Geometry.js"></script>
    <script src="../src/objects/Object3D.js"></script>
    <script src="../src/objects/Mesh.js"></script>
    <script src="../src/objects/Line.js"></script>
    <script src="../src/objects/Particle.js"></script>
    <script src="../src/cameras/Camera.js"></script>
    <script src="../src/materials/ColorFillMaterial.js"></script>
    <script src="../src/materials/ColorStrokeMaterial.js"></script>
    <script src="../src/scenes/Scene.js"></script>
    <script src="../src/renderers/renderables/RenderableFace3.js"></script>
    <script src="../src/renderers/renderables/RenderableFace4.js"></script>
    <script src="../src/renderers/renderables/RenderableLine.js"></script>
    <script src="../src/renderers/renderables/RenderableParticle.js"></script>
    <script src="../src/renderers/Renderer.js"></script>
    <script src="../src/Three.js"></script>

    <script>
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var width = canvas.width = window.innerWidth;
        var height = canvas.height = window.innerHeight;

        var renderer = new THREE.Renderer();
        var scene = new THREE.Scene();
        var camera = new THREE.Camera(75, width / height, 0.1, 1000);

        camera.position.z = 300;

        var geometry = new THREE.Geometry();
        var size = 100;

        geometry.vertices.push(new THREE.Vertex(new THREE.Vector3(-size, -size, 0)));
        geometry.vertices.push(new THREE.Vertex(new THREE.Vector3(size, -size, 0)));
        geometry.vertices.push(new THREE.Vertex(new THREE.Vector3(size, size, 0)));
        geometry.vertices.push(new THREE.Vertex(new THREE.Vector3(-size, size, 0)));

        geometry.faces.push(new THREE.Face3(0, 1, 2));
        geometry.faces.push(new THREE.Face3(0, 2, 3));

        var material = new THREE.ColorFillMaterial(0xff0000, 1);
        var mesh = new THREE.Mesh(geometry, material);

        scene.add(mesh);

        var angle = 0;

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 1)';
            ctx.fillRect(0, 0, width, height);

            mesh.rotation.x += 0.01;
            mesh.rotation.y += 0.02;

            renderer.project(scene, camera);

            var renderList = renderer.renderList;
            for (var i = 0; i < renderList.length; i++) {
                var face = renderList[i];

                if (face instanceof THREE.RenderableFace3) {
                    var v1 = face.v1, v2 = face.v2, v3 = face.v3;

                    ctx.beginPath();
                    ctx.moveTo((v1.x + 1) * width / 2, (-v1.y + 1) * height / 2);
                    ctx.lineTo((v2.x + 1) * width / 2, (-v2.y + 1) * height / 2);
                    ctx.lineTo((v3.x + 1) * width / 2, (-v3.y + 1) * height / 2);
                    ctx.closePath();

                    ctx.fillStyle = face.material[0].color.__styleString;
                    ctx.fill();
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
