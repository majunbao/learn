<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }
    canvas {
      border: 1px solid black;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="300" height="300"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
    let direction = 'right';
    let food = {x: 15, y: 15};
    let gameOver = false;

    function gameLoop() {
      if (gameOver) {
        clearInterval(interval);
        alert('Game Over!');
        return;
      }

      let head = {x: snake[0].x, y: snake[0].y};
      switch (direction) {
        case 'up':
          head.y--;
          break;
        case 'down':
          head.y++;
          break;
        case 'left':
          head.x--;
          break;
        case 'right':
          head.x++;
          break;
      }
      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        food = {x: Math.floor(Math.random() * 30), y: Math.floor(Math.random() * 30)};
      } else {
        snake.pop();
      }

      if (head.x < 0 || head.x >= 30 || head.y < 0 || head.y >= 30 || snake.some((segment, index) => index > 0 && segment.x === head.x && segment.y === head.y)) {
        gameOver = true;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'green';
      snake.forEach(segment => ctx.fillRect(segment.x * 10, segment.y * 10, 10, 10));
      ctx.fillStyle = 'red';
      ctx.fillRect(food.x * 10, food.y * 10, 10, 10);
    }

    let interval = setInterval(gameLoop, 100);

    document.addEventListener('keydown', event => {
      switch (event.key) {
        case 'ArrowUp':
          if (direction !== 'down') direction = 'up';
          break;
        case 'ArrowDown':
          if (direction !== 'up') direction = 'down';
          break;
        case 'ArrowLeft':
          if (direction !== 'right') direction = 'left';
          break;
        case 'ArrowRight':
          if (direction !== 'left') direction = 'right';
          break;
      }
    });
  </script>
</body>
</html>
