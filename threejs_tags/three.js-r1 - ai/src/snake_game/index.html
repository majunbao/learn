<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顶尖贪吃蛇游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="score-board">
                <div class="score-item">
                    <span class="label">得分:</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">最高分:</span>
                    <span id="high-score" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">长度:</span>
                    <span id="length" class="value">1</span>
                </div>
            </div>
            <div class="game-controls">
                <button id="start-btn" class="btn primary">开始</button>
                <button id="pause-btn" class="btn secondary">暂停</button>
                <button id="reset-btn" class="btn danger">重置</button>
            </div>
        </div>
        
        <div class="game-area">
            <canvas id="game-canvas" width="600" height="400"></canvas>
            
            <div id="game-over-screen" class="overlay hidden">
                <div class="game-over-content">
                    <h2>游戏结束!</h2>
                    <p>最终得分: <span id="final-score">0</span></p>
                    <p>最高分: <span id="final-high-score">0</span></p>
                    <button id="restart-btn" class="btn primary">重新开始</button>
                </div>
            </div>
            
            <div id="start-screen" class="overlay">
                <div class="start-content">
                    <h1>顶尖贪吃蛇</h1>
                    <p>使用方向键控制蛇的移动</p>
                    <button id="begin-game-btn" class="btn primary">开始游戏</button>
                    <div class="game-instructions">
                        <h3>游戏说明</h3>
                        <ul>
                            <li>使用方向键控制蛇的移动</li>
                            <li>吃到食物增加长度和分数</li>
                            <li>避免撞墙或撞到自己</li>
                            <li>游戏会逐渐加快</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="game-footer">
            <div class="game-info">
                <div class="info-item">
                    <span class="label">速度:</span>
                    <span id="speed" class="value">1</span>
                </div>
                <div class="info-item">
                    <span class="label">食物数量:</span>
                    <span id="food-count" class="value">1</span>
                </div>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
